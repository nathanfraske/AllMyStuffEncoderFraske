name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The library workspace — scanner, graph, protocol, bridge, session,
  # updater, CLI. Run on all three platforms so the macOS / Windows device
  # probes and the updater are compiled and unit-tested where they run.
  rust:
    name: Rust · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace
      - name: scan smoke test
        run: cargo run -p allmystuff-cli -- capabilities

  # The Svelte front-end: typecheck + production build.
  gui:
    name: GUI front-end
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: gui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm build

  # The headless mesh node (its own workspace): the engine the GUI links + the
  # `allmystuff-serve` binary `allmystuff serve` runs. Same media stack as the
  # GUI backend, minus the webview — built and tested on all three platforms
  # so the headless node compiles everywhere it ships.
  node:
    name: Node · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # The Opus bundled by `audiopus_sys` (via the `opus` crate) declares an
    # ancient `cmake_minimum_required`, which CMake 4.x on the runners refuses
    # outright. This shim re-enables the old policy floor for every CMake build
    # in the job (Opus, and mozjpeg via nokhwa). Same fix the GUI backend and
    # release jobs carry.
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: node
      # libgtk-3-dev + libwayland-dev aren't a webview dependency — they pull
      # the X11 / XCB / Wayland system libs that the screen-capture (xcap) and
      # input (enigo, xcb) crates link against. The GUI backend job gets these
      # transitively through webkit/gtk; the headless node has to ask for them.
      - name: Linux media deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libpipewire-0.3-dev libxkbcommon-dev \
            libgbm-dev libudev-dev libgtk-3-dev libwayland-dev \
            libavcodec-dev libavformat-dev libavutil-dev libavfilter-dev \
            libavdevice-dev libswscale-dev libswresample-dev
      - name: rustfmt
        if: matrix.os == 'ubuntu-latest'
        working-directory: node
        run: cargo fmt --check
      # clippy on the Linux reference platform only. This engine is the former
      # GUI backend, which CI has always treated as compile-checked (not
      # clippy'd) on macOS/Windows — `cargo test` below still builds every
      # target there, so the platform-specific capture/input code is verified;
      # `-D warnings` lint policy stays on Linux, matching that history.
      - name: clippy
        if: matrix.os == 'ubuntu-latest'
        working-directory: node
        run: cargo clippy --all-targets -- -D warnings
      # Lint + build the hardware-encode path too (FFmpeg dev libs installed
      # above). Linux is enough to verify the `hwenc` code; the per-OS encoder
      # list is the only platform-specific part. The default build above stays
      # software-only so the macOS/Windows jobs need no FFmpeg toolchain.
      - name: clippy (hwenc)
        if: matrix.os == 'ubuntu-latest'
        working-directory: node
        run: cargo clippy --all-targets --features hwenc -- -D warnings
      - name: test
        working-directory: node
        run: cargo test
      - name: test (hwenc)
        if: matrix.os == 'ubuntu-latest'
        working-directory: node
        run: cargo test --features hwenc

  # The Tauri backend (its own workspace): cpal audio bridge + mesh session
  # + control client. Compile-checked on all three platforms — this is what
  # verifies the streaming code the headless dev container can't link.
  gui-backend:
    name: GUI backend · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # Skip bundling the myownmesh daemon sidecar here — CI only needs to
    # verify the app compiles. build.rs stamps a stub so tauri-build's
    # externalBin check passes; the real bundle happens on dev / release
    # builds (and is exercised by `just dev`).
    #
    # CMAKE_POLICY_VERSION_MINIMUM re-enables the pre-3.5 policy floor that the
    # Opus bundled by `audiopus_sys` (via the node engine's `opus` dep) needs —
    # CMake 4.x on the runners rejects it otherwise.
    env:
      ALLMYSTUFF_SKIP_SIDECAR: "1"
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/src-tauri
      - name: Linux webview + audio deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev libasound2-dev \
            libpipewire-0.3-dev libxkbcommon-dev libgbm-dev
      # Tauri's build script wants the frontend dist to exist.
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: gui/pnpm-lock.yaml
      - name: build frontend (for tauri build script)
        working-directory: gui
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - name: cargo check backend
        working-directory: gui/src-tauri
        run: cargo check
      # The backend has real unit tests now (the terminal's PTY host runs a
      # live openpty/ConPTY round-trip per OS) — run them where they run.
      - name: cargo test backend
        working-directory: gui/src-tauri
        run: cargo test
