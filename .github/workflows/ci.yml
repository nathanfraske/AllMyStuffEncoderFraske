name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The library workspace — scanner, graph, protocol, bridge, session,
  # updater, CLI. Run on all three platforms so the macOS / Windows device
  # probes and the updater are compiled and unit-tested where they run.
  rust:
    name: Rust · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace
      - name: scan smoke test
        run: cargo run -p allmystuff-cli -- capabilities

  # The Svelte front-end: typecheck + production build.
  gui:
    name: GUI front-end
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: gui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm build

  # The Tauri backend (its own workspace): cpal audio bridge + mesh session
  # + control client. Compile-checked on all three platforms — this is what
  # verifies the streaming code the headless dev container can't link.
  gui-backend:
    name: GUI backend · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/src-tauri
      - name: Linux webview + audio deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev libasound2-dev
      # Tauri's build script wants the frontend dist to exist.
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: gui/pnpm-lock.yaml
      - name: build frontend (for tauri build script)
        working-directory: gui
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - name: cargo check backend
        working-directory: gui/src-tauri
        run: cargo check
