name: Release

# Triggered either by pushing a tag `v*` or by `gh workflow run` (which is
# what `just release X.Y.Z` does). The `tag` input lets a maintainer kick
# off a release for a tag that doesn't exist yet — the tauri-action call
# below creates the GitHub release at that name.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  bundles:
    name: Build (${{ matrix.platform.name }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          # Linux builds are pinned to Ubuntu 22.04 (glibc 2.35) — not
          # ubuntu-latest — so the resulting binaries run on Ubuntu 22.04+,
          # Debian 12, and other distros still on glibc 2.35/2.36/2.38.
          # Building on 24.04 links against glibc 2.39 and breaks anything
          # older with "GLIBC_2.39 not found". Matches MyOwnMesh /
          # MyOwnLLM so users get the same portability promise across apps.
          - { name: linux-x86_64,   os: ubuntu-22.04,     target: x86_64-unknown-linux-gnu }
          - { name: linux-aarch64,  os: ubuntu-22.04-arm, target: aarch64-unknown-linux-gnu }
          - { name: macos-aarch64,  os: macos-14,         target: aarch64-apple-darwin }
          - { name: macos-x86_64,   os: macos-14,         target: x86_64-apple-darwin }
          - { name: windows-x86_64, os: windows-latest,   target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.platform.os }}
    # The Opus bundled by `audiopus_sys` (via the node engine + GUI `opus` dep)
    # declares a pre-3.5 `cmake_minimum_required` that CMake 4.x rejects; this
    # shim re-enables the old policy floor for every CMake build in the job.
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
      # Bake the release public key into every binary so the self-updater
      # requires a valid minisign signature (set the ALLMYSTUFF_RELEASE_PUBKEY
      # repo *variable* — it isn't secret — to enable; empty leaves the updater
      # SHA-256-only). See RELEASE-SIGNING.md.
      ALLMYSTUFF_RELEASE_PUBKEY: ${{ vars.ALLMYSTUFF_RELEASE_PUBKEY }}
    steps:
      - uses: actions/checkout@v4

      # Guard against the "tag says v0.2.0, binary reports 0.1.5" trap. The
      # CLI binary embeds CARGO_PKG_VERSION (via [workspace.package].version)
      # at compile time, the self-updater compares it against the release
      # feed, and the GUI's window title pulls from gui/src-tauri/Cargo.toml.
      # If any manifest disagrees with the tag, every install will misreport
      # itself and the self-update poll will loop forever. The workspace
      # Cargo.toml is the source of truth; scripts/bump-version.sh keeps the
      # GUI sub-workspace files in sync.
      - name: Verify tag matches manifest versions
        shell: bash
        run: |
          set -e
          TAG="${{ inputs.tag || github.ref_name }}"
          EXPECTED="${TAG#v}"
          fail() { echo "::error::$*"; exit 1; }
          got_workspace=$(awk '
            /^\[workspace\.package\]/ {in_pkg=1; next}
            /^\[/ {in_pkg=0}
            in_pkg && /^version =/ {gsub(/[ "]/, "", $0); split($0, a, "="); print a[2]; exit}
          ' Cargo.toml)
          got_gui_cargo=$(awk -F\" '/^version = / {print $2; exit}' gui/src-tauri/Cargo.toml)
          got_gui_pkg=$(node -e "console.log(require('./gui/package.json').version)")
          [[ "$got_workspace" == "$EXPECTED" ]] || fail "Cargo.toml [workspace.package].version is $got_workspace, expected $EXPECTED (tag $TAG). Run 'just release $EXPECTED' to bump."
          [[ "$got_gui_cargo" == "$EXPECTED" ]] || fail "gui/src-tauri/Cargo.toml version is $got_gui_cargo, expected $EXPECTED (tag $TAG). Run 'just release $EXPECTED' to bump."
          [[ "$got_gui_pkg"   == "$EXPECTED" ]] || fail "gui/package.json version is $got_gui_pkg, expected $EXPECTED (tag $TAG). Run 'just release $EXPECTED' to bump."
          echo "Manifest versions match tag $TAG ($EXPECTED)."

      # The Tauri GUI links the webkit/GTK stack, and both it and the headless
      # node binary link the media stack (ALSA via cpal, PipeWire/gbm via xcap,
      # xkbcommon via enigo). The bare CLI needs none of it, but installing
      # everything here covers all three build steps in one place.
      - name: Linux deps
        if: runner.os == 'Linux'
        run: |
          # Ubuntu 22.04 ships PipeWire 0.3.48, whose headers are too old
          # for the libspa 0.9 bindings xcap's screen capture pulls in —
          # bindgen generates spa_video_info_raw without the `flags` field
          # and libspa fails to compile (this is what sank the linux jobs
          # of the v0.1.1 release). The pipewire-upstream PPA publishes
          # current PipeWire built *for* 22.04, so the release keeps its
          # glibc 2.35 floor while the capture stack compiles. ci.yml
          # doesn't need this — it runs on ubuntu-latest (24.04), whose
          # stock headers are new enough; that asymmetry is why CI stayed
          # green while the release broke.
          sudo add-apt-repository -y ppa:pipewire-debian/pipewire-upstream
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev libasound2-dev xdg-utils \
            libpipewire-0.3-dev libxkbcommon-dev libgbm-dev

      # Match the repo's rust-toolchain.toml (channel = "stable") and ci.yml
      # so the cross-compile target is added to the *same* toolchain cargo
      # actually uses. Pinning a different version here (e.g. @1.88.0) adds
      # the target to a toolchain rust-toolchain.toml then overrides, so the
      # non-native target (x86_64-apple-darwin on the arm64 macOS runner)
      # goes missing — "can't find crate for `core`".
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      # Two separate Cargo workspaces in this repo — the library/CLI
      # workspace at the root, and the Tauri GUI under `gui/src-tauri`. Each
      # gets its own cache scope so they don't stomp each other.
      - name: Cache (library workspace)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          key: lib-${{ matrix.platform.os }}

      - name: Cache (GUI workspace)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/src-tauri -> target
          key: gui-${{ matrix.platform.os }}

      - name: Cache (node workspace)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: node -> target
          key: node-${{ matrix.platform.os }}

      # No `version:` — pnpm/action-setup@v4 reads the version from
      # gui/package.json's `packageManager` field. Pinning a different
      # `version:` here causes pnpm 10+ to refuse to run with
      # ERR_PNPM_BAD_PM_VERSION. There is no root package.json in this repo,
      # so point the action at the GUI manifest explicitly — otherwise it
      # fails with "No pnpm version is specified".
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: gui/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: gui/pnpm-lock.yaml

      - name: Install GUI dependencies
        working-directory: gui
        run: pnpm install --frozen-lockfile

      # Build the headless CLI first. The bundle step below ships it
      # alongside the GUI installer so users get a `scan`/`capabilities`
      # binary too, and the self-updater can fetch it as its own asset.
      - name: Build CLI
        run: cargo build --release --bin allmystuff --target ${{ matrix.platform.target }}

      # Build `amst` (AMSTerm) — the standalone mesh terminal. A separate,
      # self-contained program in the same root workspace (no webview, no media
      # stack), shipped as its own portable asset and installed by its own
      # `install-amst` script.
      - name: Build amst (AMSTerm)
        run: cargo build --release --bin amst --target ${{ matrix.platform.target }}

      # Build the headless node binary (`allmystuff-serve`, what `allmystuff
      # serve` runs). It carries the whole media/mesh engine, so it links the
      # same native stack as the GUI (minus the webview). Shipped alongside
      # the CLI so a headless `allmystuff serve` / `allmystuff service` works
      # without the desktop app.
      - name: Build node serve binary
        run: cargo build --release --manifest-path node/Cargo.toml --bin allmystuff-serve --target ${{ matrix.platform.target }}

      # Build the Tauri GUI bundle. tauri-action runs `pnpm tauri build`
      # under the hood and uploads the resulting installers (.deb /
      # .AppImage / .dmg / .msi / .exe) to the named release. `projectPath:
      # gui` points it at the GUI's own workspace. The GUI's build.rs
      # bundles the `myownmesh` daemon sidecar for the rev pinned in
      # .myownmesh-rev — so we deliberately do NOT set
      # ALLMYSTUFF_SKIP_SIDECAR here; the released app ships with mesh
      # built in.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: gui
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: ${{ inputs.tag || github.ref_name }}
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.platform.target }}

      # Package the portable CLI binary as a tarball / zip so users who
      # don't want the GUI installer can `curl | tar` it, and the
      # self-updater can fetch `allmystuff-<platform>.<ext>` directly. The
      # .sha256 sidecar is what `allmystuff-updater` verifies against.
      - name: Package portable CLI binary
        shell: bash
        run: |
          set -e
          BIN=target/${{ matrix.platform.target }}/release/allmystuff
          if [[ "${{ runner.os }}" == "Windows" ]]; then BIN="${BIN}.exe"; fi
          if [[ ! -f "$BIN" ]]; then
            echo "CLI binary not found at $BIN"; exit 1
          fi
          mkdir -p dist-bin
          NAME="allmystuff-${{ matrix.platform.name }}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "$BIN" "dist-bin/allmystuff.exe"
            (cd dist-bin && 7z a "${NAME}.zip" allmystuff.exe)
            (cd dist-bin && (sha256sum "${NAME}.zip" || shasum -a 256 "${NAME}.zip") > "${NAME}.zip.sha256")
          else
            cp "$BIN" "dist-bin/allmystuff"
            tar -czf "dist-bin/${NAME}.tar.gz" -C dist-bin allmystuff
            (cd dist-bin && (sha256sum "${NAME}.tar.gz" || shasum -a 256 "${NAME}.tar.gz") > "${NAME}.tar.gz.sha256")
          fi

      # Package the portable `amst` (AMSTerm) binary so `install-amst` can fetch
      # `amst-<platform>.<ext>` directly. The raw binary is left in dist-bin
      # (the upload glob only matches the archives + .sha256, like the CLI step).
      - name: Package portable amst binary
        shell: bash
        run: |
          set -e
          BIN=target/${{ matrix.platform.target }}/release/amst
          if [[ "${{ runner.os }}" == "Windows" ]]; then BIN="${BIN}.exe"; fi
          if [[ ! -f "$BIN" ]]; then
            echo "amst binary not found at $BIN"; exit 1
          fi
          mkdir -p dist-bin
          NAME="amst-${{ matrix.platform.name }}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "$BIN" "dist-bin/amst.exe"
            (cd dist-bin && 7z a "${NAME}.zip" amst.exe)
            (cd dist-bin && (sha256sum "${NAME}.zip" || shasum -a 256 "${NAME}.zip") > "${NAME}.zip.sha256")
          else
            cp "$BIN" "dist-bin/amst"
            tar -czf "dist-bin/${NAME}.tar.gz" -C dist-bin amst
            (cd dist-bin && (sha256sum "${NAME}.tar.gz" || shasum -a 256 "${NAME}.tar.gz") > "${NAME}.tar.gz.sha256")
          fi

      # Package the portable GUI binary the same way so the self-updater can
      # fetch `allmystuff-gui-<platform>.<ext>` too. The OS bundles
      # (.deb/.dmg/.msi/...) uploaded above are still the "proper install";
      # this is the lightweight half. Remove the raw binary afterwards so it
      # isn't caught by the upload glob below — only the archives + .sha256
      # ship.
      - name: Package portable GUI binary
        shell: bash
        run: |
          set -e
          BIN=gui/src-tauri/target/${{ matrix.platform.target }}/release/allmystuff-gui
          if [[ "${{ runner.os }}" == "Windows" ]]; then BIN="${BIN}.exe"; fi
          if [[ ! -f "$BIN" ]]; then
            echo "GUI binary not found at $BIN"; exit 1
          fi
          mkdir -p dist-bin
          NAME="allmystuff-gui-${{ matrix.platform.name }}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "$BIN" "dist-bin/allmystuff-gui.exe"
            (cd dist-bin && 7z a "${NAME}.zip" allmystuff-gui.exe)
            (cd dist-bin && (sha256sum "${NAME}.zip" || shasum -a 256 "${NAME}.zip") > "${NAME}.zip.sha256")
            rm -f dist-bin/allmystuff-gui.exe
          else
            cp "$BIN" "dist-bin/allmystuff-gui"
            tar -czf "dist-bin/${NAME}.tar.gz" -C dist-bin allmystuff-gui
            (cd dist-bin && (sha256sum "${NAME}.tar.gz" || shasum -a 256 "${NAME}.tar.gz") > "${NAME}.tar.gz.sha256")
            rm -f dist-bin/allmystuff-gui
          fi

      # Package the portable node binary so a headless box can fetch
      # `allmystuff-serve-<platform>.<ext>` (the installer drops it next to
      # the CLI, and `allmystuff serve` / `service` find it there).
      - name: Package portable node binary
        shell: bash
        run: |
          set -e
          BIN=node/target/${{ matrix.platform.target }}/release/allmystuff-serve
          if [[ "${{ runner.os }}" == "Windows" ]]; then BIN="${BIN}.exe"; fi
          if [[ ! -f "$BIN" ]]; then
            echo "node serve binary not found at $BIN"; exit 1
          fi
          mkdir -p dist-bin
          NAME="allmystuff-serve-${{ matrix.platform.name }}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "$BIN" "dist-bin/allmystuff-serve.exe"
            (cd dist-bin && 7z a "${NAME}.zip" allmystuff-serve.exe)
            (cd dist-bin && (sha256sum "${NAME}.zip" || shasum -a 256 "${NAME}.zip") > "${NAME}.zip.sha256")
            rm -f dist-bin/allmystuff-serve.exe
          else
            cp "$BIN" "dist-bin/allmystuff-serve"
            tar -czf "dist-bin/${NAME}.tar.gz" -C dist-bin allmystuff-serve
            (cd dist-bin && (sha256sum "${NAME}.tar.gz" || shasum -a 256 "${NAME}.tar.gz") > "${NAME}.tar.gz.sha256")
            rm -f dist-bin/allmystuff-serve
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            dist-bin/allmystuff-*
            dist-bin/amst-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Detached Ed25519 (minisign) signatures over the portable archives, so the
  # self-updater can prove provenance, not just integrity. Runs once after all
  # platform bundles upload, and is a NO-OP until the maintainer configures the
  # MINISIGN_SECRET_KEY secret (and bakes ALLMYSTUFF_RELEASE_PUBKEY into the
  # shipped build) — see RELEASE-SIGNING.md. Gating means an unconfigured repo
  # still releases exactly as before.
  sign:
    name: Sign release artifacts (minisign)
    needs: bundles
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Gate on signing key
        id: gate
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          if [ -n "$MINISIGN_SECRET_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::MINISIGN_SECRET_KEY not configured — skipping signing; artifacts ship SHA-256-only. See RELEASE-SIGNING.md."
          fi

      - name: Install minisign
        if: steps.gate.outputs.enabled == 'true'
        run: |
          set -e
          curl -fsSL -o minisign.tar.gz \
            https://github.com/jedisct1/minisign/releases/download/0.11/minisign-0.11-linux.tar.gz
          tar -xzf minisign.tar.gz
          sudo install -m 0755 minisign-linux/x86_64/minisign /usr/local/bin/minisign

      - name: Download release artifacts
        if: steps.gate.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -e
          mkdir -p signing
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --dir signing \
            --pattern 'allmystuff-*.tar.gz' --pattern 'allmystuff-*.zip' \
            --pattern 'amst-*.tar.gz' --pattern 'amst-*.zip'

      - name: Sign and upload signatures
        if: steps.gate.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -e
          printf '%s\n' "$MINISIGN_SECRET_KEY" > signing/minisign.key
          cd signing
          shopt -s nullglob
          # Password-less CI key (see RELEASE-SIGNING.md): no prompt, </dev/null
          # guards against ever hanging on one.
          for f in allmystuff-*.tar.gz allmystuff-*.zip amst-*.tar.gz amst-*.zip; do
            minisign -S -s minisign.key -m "$f" -x "$f.minisig" </dev/null
          done
          rm -f minisign.key
          gh release upload "$TAG" allmystuff-*.minisig amst-*.minisig --repo "$GITHUB_REPOSITORY" --clobber
