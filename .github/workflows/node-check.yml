# Cross-platform compile check for the node engine — the encoder work is
# developed on Windows, and the macOS (VideoToolbox) and Linux (Wayland/
# PipeWire) arms are otherwise compile-blind until someone builds there.
# check + clippy only (no hardware to run against); every desktop platform is
# required so platform-gated video changes cannot merge compile-blind.
name: node-check

on:
  push:
    branches: [main]
    paths:
      - "node/**"
      - "Cargo.*"
      - ".github/workflows/node-check.yml"
  pull_request:
    paths:
      - "node/**"
      - "Cargo.*"
      - ".github/workflows/node-check.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # audiopus_sys/mozjpeg still declare a pre-3.5 CMake policy floor; CMake 4
  # runners require the same compatibility shim as the main CI/release jobs.
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest
          - os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Linux system deps (xcap/X11, audio, DBus for the portal)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcb1-dev libxcb-randr0-dev \
            libxcb-shm0-dev libxcb-xfixes0-dev libdbus-1-dev libasound2-dev \
            libpipewire-0.3-dev libwayland-dev libxkbcommon-dev libgbm-dev \
            libudev-dev libgtk-3-dev libegl-dev libegl1-mesa-dev cmake nasm
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: node
      - name: clippy (deny warnings)
        working-directory: node
        run: cargo clippy --all-targets -- -D warnings
