# The GUI's Rust crate lives outside the main Cargo workspace so a
# `cargo build --workspace` / `cargo test --workspace` at the repo root
# stays fast and webview-free (no Tauri compile). An empty `[workspace]`
# table makes this crate its own single-member workspace root — the same
# split MyOwnMesh uses for its GUI.
[workspace]

[package]
name = "allmystuff-gui"
version = "0.1.0"
description = "AllMyStuff GUI — Tauri shell: scans this machine and talks to the myownmesh daemon over its control socket."
authors = ["Chris Paul"]
license = "MIT"
edition = "2021"
rust-version = "1.88.0"

[[bin]]
name = "allmystuff-gui"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
tauri-plugin-dialog = "2"

# Async runtime — control-socket client + Tauri commands.
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "sync", "time", "io-util", "net"] }

# Local IPC: same crate the daemon uses, so control-socket address
# resolution stays identical across both ends of the wire.
interprocess = { version = "2", features = ["tokio"] }

serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
dirs = "5"
parking_lot = "0.12"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# AllMyStuff's own crates — the scanner, the graph model, the wire types,
# and the hardware→capability bridge. Pulled by path from the sibling
# workspace; the GUI is the one place all four come together.
allmystuff-inventory = { path = "../../crates/allmystuff-inventory" }
allmystuff-graph = { path = "../../crates/allmystuff-graph" }
allmystuff-protocol = { path = "../../crates/allmystuff-protocol" }
allmystuff-bridge = { path = "../../crates/allmystuff-bridge" }

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
