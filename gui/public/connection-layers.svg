<svg xmlns="http://www.w3.org/2000/svg" id="cl-poster" viewBox="0 0 1240 800" width="1240" height="800" role="img" aria-labelledby="t d">
  <title id="t">How AllMyStuff connects — call the same name, in the same place</title>
  <desc id="d">A mesh is a beacon: the name you call out. A venue is the place you call it — a signal layer (Signal, STUN, TURN). You reach someone when you both call the same name at a venue you share. Your fleet is your own devices. Sharing grants a specific thing — a service in one device — to an owner, so any of their devices can use it.</desc>

  <defs>
    <style>
      #cl-poster text{font-family:'Saira',system-ui,sans-serif}
      #cl-poster .eyebrow{font:600 14px 'IBM Plex Mono',ui-monospace,monospace;letter-spacing:.22em;fill:oklch(0.64 0.255 350)}
      #cl-poster .h1{font:700 42px 'Saira Condensed','Arial Narrow',system-ui,sans-serif;fill:oklch(0.93 0.012 285);letter-spacing:.004em}
      #cl-poster .sub{font:400 17px 'Saira',system-ui,sans-serif;fill:oklch(0.75 0.02 285)}
      #cl-poster .vlab{font:700 16px 'IBM Plex Mono',ui-monospace,monospace;letter-spacing:.16em;fill:oklch(0.82 0.15 90)}
      #cl-poster .vsub{font:600 11px 'IBM Plex Mono',ui-monospace,monospace;letter-spacing:.1em;fill:oklch(0.62 0.05 285)}
      #cl-poster .name{font:700 17px 'IBM Plex Mono',ui-monospace,monospace;letter-spacing:.04em}
      #cl-poster .who{font:600 15px 'Saira',system-ui,sans-serif}
      #cl-poster .cap{font:500 12.5px 'IBM Plex Mono',ui-monospace,monospace;letter-spacing:.06em;fill:oklch(0.6 0.025 285)}
      #cl-poster .link{font:700 13px 'IBM Plex Mono',ui-monospace,monospace;letter-spacing:.18em;fill:oklch(0.8 0.17 150)}
      #cl-poster .sectn{font:700 13px 'IBM Plex Mono',ui-monospace,monospace;letter-spacing:.18em;fill:oklch(0.64 0.255 350)}
      #cl-poster .tok{font:600 14px 'Saira',system-ui,sans-serif;fill:oklch(0.93 0.012 285)}
      #cl-poster .foot{font:600 12.5px 'IBM Plex Mono',ui-monospace,monospace;letter-spacing:.04em;fill:oklch(0.6 0.025 285)}
      #cl-poster .ac{fill:oklch(0.64 0.255 350)} #cl-poster .vi{fill:oklch(0.62 0.2 292)} #cl-poster .ok{fill:oklch(0.8 0.17 150)} #cl-poster .am{fill:oklch(0.82 0.15 90)}
      #cl-poster .beamflow{stroke-dasharray:3 11;animation:cl-flow 0.95s linear infinite}
      #cl-poster .flow{stroke-dasharray:2 8;animation:cl-flow 1.1s linear infinite}
      @keyframes cl-flow{to{stroke-dashoffset:-28}}
      @media (prefers-reduced-motion:reduce){#cl-poster .beamflow,#cl-poster .flow{animation:none}}
    </style>
    <radialGradient id="gv" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="oklch(0.62 0.2 292)" stop-opacity="0.45"/><stop offset="100%" stop-color="oklch(0.62 0.2 292)" stop-opacity="0"/></radialGradient>
    <radialGradient id="gm" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="oklch(0.64 0.255 350)" stop-opacity="0.38"/><stop offset="100%" stop-color="oklch(0.64 0.255 350)" stop-opacity="0"/></radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.4" fill="oklch(0.62 0.2 292)" opacity="0.1"/></pattern>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#000" flood-opacity="0.4"/></filter>

    <g id="i-laptop" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><rect x="4.5" y="5" width="15" height="10" rx="1.4"/><path d="M2.5 18.5 L21.5 18.5 L19.5 15 L4.5 15 Z"/></g>
    <g id="i-tv" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><rect x="3.5" y="6.5" width="17" height="11.5" rx="1.4"/><path d="M8.5 3 L12 6.3 L15.5 3"/></g>
    <g id="i-phone" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><rect x="7" y="2.8" width="10" height="18.4" rx="2.2"/><path d="M11 18.6 h2"/></g>
    <g id="i-monitor" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><rect x="3.5" y="4.5" width="17" height="11.5" rx="1.4"/><path d="M9 20 H15 M12 16 V20"/></g>
    <g id="i-person" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M5 20 a7 7 0 0 1 14 0"/></g>
    <g id="i-signal" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="14" r="1.8" fill="currentColor" stroke="none"/><path d="M8.2 10.2 a5.4 5.4 0 0 0 0 7.6 M15.8 10.2 a5.4 5.4 0 0 1 0 7.6"/><path d="M5.6 7.6 a9 9 0 0 0 0 12.8 M18.4 7.6 a9 9 0 0 1 0 12.8"/></g>
    <g id="i-check" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5 l4.5 4.5 L19 7"/></g>
  </defs>

  <rect width="1240" height="800" fill="oklch(0.135 0.022 285)"/>
  <rect width="1240" height="800" fill="url(#dots)"/>
  <ellipse cx="180" cy="70" rx="560" ry="300" fill="url(#gv)"/>
  <ellipse cx="1080" cy="70" rx="520" ry="300" fill="url(#gm)"/>

  <!-- TITLE -->
  <path d="M80 66 h26" stroke="oklch(0.64 0.255 350)" stroke-opacity="0.5" stroke-width="1.5"/>
  <text class="eyebrow" x="116" y="71">HOW ALLMYSTUFF CONNECTS</text>
  <g transform="translate(1166,36) scale(0.4)" fill="oklch(0.64 0.255 350)"><g stroke="oklch(0.64 0.255 350)" stroke-width="13" fill="none" stroke-linecap="round"><path d="M128 74 L77 165 M128 74 L181 160 M77 165 L181 160"/></g><circle cx="128" cy="72" r="27"/><circle cx="76" cy="166" r="22"/><circle cx="182" cy="160" r="22"/></g>
  <text class="h1" x="78" y="116">Call the same name, in the same place.</text>
  <text class="sub" x="80" y="146">The name is your <tspan class="ac" style="font-weight:600">mesh</tspan>. The place is a <tspan class="am" style="font-weight:600">venue</tspan>. Meet anyone who calls the same name where you both are.</text>

  <!-- ===================== THE VENUE (hero) ===================== -->
  <rect x="120" y="196" width="1000" height="312" rx="22" fill="oklch(0.165 0.024 285)" stroke="oklch(0.82 0.15 90 / 0.35)" filter="url(#sh)"/>
  <use href="#i-signal" width="22" height="22" x="148" y="216" color="oklch(0.82 0.15 90)"/>
  <text class="vlab" x="178" y="233">THE VENUE</text>
  <text class="vsub" x="148" y="254">WHERE YOU CALL OUT · SIGNAL · STUN · TURN · ONE OF MANY</text>

  <!-- same-name brace across the top -->
  <text class="name ac" x="350" y="312" text-anchor="middle">“home”</text>
  <text x="500" y="311" text-anchor="middle" style="font:600 16px 'IBM Plex Mono',monospace;fill:oklch(0.5 0.025 285)">=</text>
  <text class="cap" x="620" y="311" text-anchor="middle">same name</text>
  <text x="740" y="311" text-anchor="middle" style="font:600 16px 'IBM Plex Mono',monospace;fill:oklch(0.5 0.025 285)">=</text>
  <text class="name vi" x="890" y="312" text-anchor="middle">“home”</text>

  <!-- YOU (inside, left) -->
  <g><circle cx="350" cy="392" r="30" fill="oklch(0.21 0.028 285)" stroke="oklch(0.64 0.255 350)" stroke-width="2.2"/><use href="#i-person" width="34" height="34" x="333" y="375" color="oklch(0.93 0.012 285)"/></g>
  <text class="who ac" x="350" y="440" text-anchor="middle">you</text>
  <g stroke="oklch(0.64 0.255 350 / 0.4)" stroke-width="1.5"><path d="M323 372 L268 348" fill="none"/><path d="M325 408 L268 430" fill="none"/></g>
  <g><circle cx="250" cy="344" r="17" fill="oklch(0.21 0.028 285)" stroke="oklch(0.64 0.255 350)" stroke-width="1.5"/><use href="#i-laptop" width="20" height="20" x="240" y="334" color="oklch(0.93 0.012 285)"/></g>
  <g><circle cx="250" cy="434" r="17" fill="oklch(0.21 0.028 285)" stroke="oklch(0.64 0.255 350)" stroke-width="1.5"/><use href="#i-phone" width="20" height="20" x="240" y="424" color="oklch(0.93 0.012 285)"/></g>
  <text class="cap ac" x="250" y="472" text-anchor="middle">your fleet</text>

  <!-- ALEX (inside, right) -->
  <g><circle cx="890" cy="392" r="30" fill="oklch(0.21 0.028 285)" stroke="oklch(0.62 0.2 292)" stroke-width="2.2"/><use href="#i-person" width="34" height="34" x="873" y="375" color="oklch(0.93 0.012 285)"/></g>
  <text class="who vi" x="890" y="440" text-anchor="middle">Alex</text>
  <g stroke="oklch(0.62 0.2 292 / 0.4)" stroke-width="1.5"><path d="M917 372 L972 348" fill="none"/><path d="M915 408 L972 430" fill="none"/></g>
  <g><circle cx="990" cy="344" r="17" fill="oklch(0.21 0.028 285)" stroke="oklch(0.62 0.2 292)" stroke-width="1.5"/><use href="#i-laptop" width="20" height="20" x="980" y="334" color="oklch(0.93 0.012 285)"/></g>
  <g><circle cx="990" cy="434" r="17" fill="oklch(0.21 0.028 285)" stroke="oklch(0.62 0.2 292)" stroke-width="1.5"/><use href="#i-tv" width="20" height="20" x="980" y="424" color="oklch(0.93 0.012 285)"/></g>
  <text class="cap vi" x="990" y="472" text-anchor="middle">Alex's fleet</text>

  <!-- the connection: same name + same place -->
  <line x1="384" y1="392" x2="856" y2="392" stroke="oklch(0.8 0.17 150)" stroke-width="9" stroke-opacity="0.16" stroke-linecap="round"/>
  <line x1="384" y1="392" x2="856" y2="392" stroke="oklch(0.8 0.17 150)" stroke-width="2.5" class="beamflow"/>
  <rect x="556" y="378" width="128" height="28" rx="14" fill="oklch(0.165 0.024 285)" stroke="oklch(0.8 0.17 150 / 0.5)"/>
  <text class="link" x="620" y="397" text-anchor="middle">CONNECTED</text>

  <text class="foot" x="620" y="540" text-anchor="middle" style="fill:oklch(0.55 0.025 285)">call the same name at more than one venue for more reach — a public one, and your own</text>

  <!-- ===================== SHARING (separate, simple) ===================== -->
  <line x1="120" y1="586" x2="1120" y2="586" stroke="oklch(0.245 0.03 285)"/>
  <text class="sectn" x="120" y="624">SHARING</text>
  <text class="sub" x="232" y="625" style="font-size:15px">Once connected, hand a friend a <tspan style="fill:oklch(0.93 0.012 285);font-weight:600">thing</tspan> — one service in one device. It goes to the <tspan style="fill:oklch(0.93 0.012 285);font-weight:600">owner</tspan>, so any of their devices can use it.</text>

  <!-- thing -> owner -> their devices -->
  <g transform="translate(120,652)">
    <rect x="0" y="14" width="186" height="56" rx="12" fill="oklch(0.21 0.028 285)" stroke="oklch(0.64 0.255 350)"/>
    <use href="#i-monitor" width="22" height="22" x="16" y="31" color="oklch(0.64 0.255 350)"/>
    <text class="tok" x="46" y="46">Screen</text>
    <text class="cap" x="46" y="62" style="letter-spacing:0">on your laptop</text>

    <path d="M186 42 H262" stroke="oklch(0.64 0.255 350)" stroke-width="2.5" fill="none" class="flow"/>
    <path d="M262 42 l-9 -6 M262 42 l-9 6" stroke="oklch(0.64 0.255 350)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <text class="cap" x="224" y="32" text-anchor="middle">to the owner</text>

    <g><circle cx="296" cy="42" r="26" fill="oklch(0.21 0.028 285)" stroke="oklch(0.62 0.2 292)" stroke-width="2"/><use href="#i-person" width="30" height="30" x="281" y="27" color="oklch(0.93 0.012 285)"/></g>
    <text class="who vi" x="296" y="86" text-anchor="middle" style="font-size:13px">Alex</text>

    <g stroke="oklch(0.62 0.2 292)" stroke-width="2" fill="none" stroke-dasharray="2 4" stroke-linecap="round"><path d="M322 28 L398 8"/><path d="M326 42 H400"/><path d="M322 56 L398 76"/></g>
    <g><circle cx="422" cy="4" r="17" fill="oklch(0.21 0.028 285)" stroke="oklch(0.62 0.2 292)" stroke-width="1.5"/><use href="#i-laptop" width="20" height="20" x="412" y="-6" color="oklch(0.93 0.012 285)"/></g>
    <g><circle cx="424" cy="42" r="17" fill="oklch(0.21 0.028 285)" stroke="oklch(0.62 0.2 292)" stroke-width="1.5"/><use href="#i-phone" width="20" height="20" x="414" y="32" color="oklch(0.93 0.012 285)"/></g>
    <g><circle cx="422" cy="80" r="17" fill="oklch(0.21 0.028 285)" stroke="oklch(0.62 0.2 292)" stroke-width="1.5"/><use href="#i-tv" width="20" height="20" x="412" y="70" color="oklch(0.93 0.012 285)"/></g>
    <use href="#i-check" width="14" height="14" x="452" y="35" color="oklch(0.8 0.17 150)"/>
    <text class="cap" x="474" y="46" style="fill:oklch(0.62 0.2 292)">any of their devices</text>

    <text class="cap" x="700" y="30" style="fill:oklch(0.6 0.025 285)">follows the person, not the machine</text>
    <text class="cap" x="700" y="50" style="fill:oklch(0.6 0.025 285)">new devices inherit it · revoke anytime</text>
    <text class="cap" x="700" y="70" style="fill:oklch(0.6 0.025 285)">nothing flows until you allow it</text>
  </g>

  <!-- FOOT legend -->
  <text class="foot" x="620" y="784" text-anchor="middle"><tspan class="ac">mesh</tspan> = the name  ·  <tspan class="am">venue</tspan> = where you call it  ·  <tspan style="fill:oklch(0.75 0.02 285)">fleet</tspan> = your devices  ·  <tspan class="ok">sharing</tspan> = give an owner a thing</text>
</svg>
