<svg xmlns="http://www.w3.org/2000/svg" id="cl-poster" viewBox="0 0 1200 900" width="1200" height="900" role="img" aria-labelledby="t d">
  <title id="t">How AllMyStuff connects — pictured as a venue</title>
  <desc id="d">A venue stands for the Signal/STUN/TURN servers — the meeting place you both come to. Inside, your booth is your mesh (your spot, where your devices find you and friends meet you), the gear at your booth is your fleet, your friend Alex has their own booth and fleet, and sharing is handing a friend one specific thing.</desc>

  <defs>
    <style>
      #cl-poster .eyebrow{font:600 14px 'IBM Plex Mono',ui-monospace,monospace;letter-spacing:.22em;fill:oklch(0.64 0.255 350)}
      #cl-poster .h1{font:700 46px 'Saira Condensed','Arial Narrow',system-ui,sans-serif;fill:oklch(0.93 0.012 285);letter-spacing:.004em}
      #cl-poster .sub{font:400 18px 'Saira',system-ui,sans-serif;fill:oklch(0.75 0.02 285)}
      #cl-poster .venue{font:700 30px 'Saira Condensed','Arial Narrow',system-ui,sans-serif;letter-spacing:.16em;fill:oklch(0.82 0.15 90)}
      #cl-poster .marq{font:600 12.5px 'IBM Plex Mono',ui-monospace,monospace;letter-spacing:.12em;fill:oklch(0.75 0.02 285)}
      #cl-poster .kname{font:700 14px 'IBM Plex Mono',ui-monospace,monospace;letter-spacing:.08em}
      #cl-poster .kd{font:400 12.5px 'Saira',system-ui,sans-serif;fill:oklch(0.75 0.02 285)}
      #cl-poster .bname{font:700 19px 'Saira Condensed','Arial Narrow',system-ui,sans-serif;letter-spacing:.08em}
      #cl-poster .bsub{font:400 12.5px 'Saira',system-ui,sans-serif;fill:oklch(0.58 0.025 285)}
      #cl-poster .flbl{font:700 12.5px 'IBM Plex Mono',ui-monospace,monospace;letter-spacing:.16em}
      #cl-poster .who{font:500 12px 'Saira',system-ui,sans-serif;fill:oklch(0.75 0.02 285)}
      #cl-poster .share{font:700 14px 'IBM Plex Mono',ui-monospace,monospace;letter-spacing:.2em;fill:oklch(0.64 0.255 350)}
      #cl-poster .tok{font:600 13px 'Saira',system-ui,sans-serif;fill:oklch(0.93 0.012 285)}
      #cl-poster .tiny{font:400 12px 'Saira',system-ui,sans-serif;fill:oklch(0.58 0.025 285)}
      #cl-poster .journey{font:600 13px 'IBM Plex Mono',ui-monospace,monospace;letter-spacing:.04em;fill:oklch(0.58 0.025 285)}
      #cl-poster .ac{fill:oklch(0.64 0.255 350)} #cl-poster .vi{fill:oklch(0.62 0.2 292)} #cl-poster .te{fill:oklch(0.75 0.15 195)} #cl-poster .ok{fill:oklch(0.8 0.17 150)} #cl-poster .am{fill:oklch(0.82 0.15 90)}
      #cl-poster .flow{stroke-dasharray:2 9;animation:cl-flow 1.1s linear infinite}
      @keyframes cl-flow{to{stroke-dashoffset:-22}}
      #cl-poster .bulb{animation:cl-bulb 2.6s ease-in-out infinite}
      @keyframes cl-bulb{0%,100%{opacity:.45}50%{opacity:1}}
      @media (prefers-reduced-motion:reduce){#cl-poster .flow{animation:none}#cl-poster .bulb{animation:none}}
    </style>

    <radialGradient id="glowV" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="oklch(0.62 0.2 292)" stop-opacity="0.5"/><stop offset="100%" stop-color="oklch(0.62 0.2 292)" stop-opacity="0"/></radialGradient>
    <radialGradient id="glowM" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="oklch(0.64 0.255 350)" stop-opacity="0.42"/><stop offset="100%" stop-color="oklch(0.64 0.255 350)" stop-opacity="0"/></radialGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="oklch(0.175 0.025 285)"/><stop offset="100%" stop-color="oklch(0.15 0.023 285)"/></linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.5" fill="oklch(0.62 0.2 292)" opacity="0.12"/></pattern>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000" flood-opacity="0.45"/></filter>

    <g id="i-laptop" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><rect x="4.5" y="5" width="15" height="10" rx="1.4"/><path d="M2.5 18.5 L21.5 18.5 L19.5 15 L4.5 15 Z"/></g>
    <g id="i-monitor" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><rect x="3.5" y="4.5" width="17" height="11.5" rx="1.4"/><path d="M9 20 H15 M12 16 V20"/></g>
    <g id="i-tv" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><rect x="3.5" y="6.5" width="17" height="11.5" rx="1.4"/><path d="M8.5 3 L12 6.3 L15.5 3"/></g>
    <g id="i-phone" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><rect x="7" y="2.8" width="10" height="18.4" rx="2.2"/><path d="M11 18.6 h2"/></g>
    <g id="i-person" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><circle cx="12" cy="8" r="3.9"/><path d="M5.4 20 a6.6 6.6 0 0 1 13.2 0"/></g>
    <g id="i-signal" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="12" cy="14" r="1.7" fill="currentColor" stroke="none"/><path d="M8.2 10.2 a5.4 5.4 0 0 0 0 7.6 M15.8 10.2 a5.4 5.4 0 0 1 0 7.6"/><path d="M5.6 7.6 a9 9 0 0 0 0 12.8 M18.4 7.6 a9 9 0 0 1 0 12.8"/></g>
    <g id="i-pin" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M12 21 C12 21 18.5 14.5 18.5 9.5 a6.5 6.5 0 0 0 -13 0 C5.5 14.5 12 21 12 21 Z"/><circle cx="12" cy="9.5" r="2.4"/></g>
    <g id="i-relay" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9 H16 M16 9 l-3 -3 M16 9 l-3 3"/><path d="M19 15 H8 M8 15 l3 -3 M8 15 l3 3"/></g>
    <g id="i-check" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5 l4.5 4.5 L19 7"/></g>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="900" fill="oklch(0.135 0.022 285)"/>
  <rect width="1200" height="900" fill="url(#dots)"/>
  <ellipse cx="140" cy="80" rx="560" ry="360" fill="url(#glowV)"/>
  <ellipse cx="1080" cy="90" rx="520" ry="340" fill="url(#glowM)"/>

  <!-- ============ TITLE ============ -->
  <path d="M60 70 h26" stroke="oklch(0.64 0.255 350)" stroke-opacity="0.5" stroke-width="1.5"/>
  <text class="eyebrow" x="96" y="75">HOW ALLMYSTUFF CONNECTS</text>
  <g transform="translate(1086,40) scale(0.4)" fill="oklch(0.64 0.255 350)"><g stroke="oklch(0.64 0.255 350)" stroke-width="13" fill="none" stroke-linecap="round"><path d="M128 74 L77 165 M128 74 L181 160 M77 165 L181 160"/></g><circle cx="128" cy="72" r="27"/><circle cx="76" cy="166" r="22"/><circle cx="182" cy="160" r="22"/></g>
  <text class="h1" x="58" y="118">Picture one big venue.</text>
  <text class="sub" x="60" y="148">You both show up there to meet friends and find your stuff — here's who's who inside.</text>

  <!-- ============ THE VENUE ============ -->
  <g transform="translate(60,168)">
    <rect x="0" y="0" width="1080" height="652" rx="26" fill="url(#floor)" stroke="oklch(0.31 0.035 285)" filter="url(#sh)"/>

    <!-- marquee -->
    <path d="M0 86 H1080" stroke="oklch(0.245 0.03 285)"/>
    <g class="bulb" fill="oklch(0.82 0.15 90)"><circle cx="60" cy="20" r="3"/><circle cx="110" cy="20" r="3"/><circle cx="160" cy="20" r="3"/><circle cx="920" cy="20" r="3"/><circle cx="970" cy="20" r="3"/><circle cx="1020" cy="20" r="3"/></g>
    <text class="venue" x="540" y="46" text-anchor="middle">THE VENUE</text>
    <text class="marq" x="540" y="70" text-anchor="middle">SIGNAL · STUN · TURN — the meeting place you both come to</text>

    <!-- the three front-of-house desks (what the venue does) -->
    <g transform="translate(24,108)">
      <!-- SIGNAL -->
      <rect x="0" y="0" width="336" height="92" rx="12" fill="oklch(0.21 0.028 285)" stroke="oklch(0.245 0.03 285)"/>
      <circle cx="34" cy="46" r="20" fill="oklch(0.135 0.022 285)" stroke="oklch(0.64 0.255 350)" stroke-width="1.5"/>
      <use href="#i-signal" width="24" height="24" x="22" y="34" color="oklch(0.64 0.255 350)"/>
      <text class="kname ac" x="66" y="40">SIGNAL</text>
      <text class="kd" x="66" y="60">find each other —</text>
      <text class="kd" x="66" y="78">who's here, where to meet</text>
      <!-- STUN -->
      <rect x="360" y="0" width="336" height="92" rx="12" fill="oklch(0.21 0.028 285)" stroke="oklch(0.245 0.03 285)"/>
      <circle cx="394" cy="46" r="20" fill="oklch(0.135 0.022 285)" stroke="oklch(0.75 0.15 195)" stroke-width="1.5"/>
      <use href="#i-pin" width="24" height="24" x="382" y="34" color="oklch(0.75 0.15 195)"/>
      <text class="kname te" x="426" y="40">STUN</text>
      <text class="kd" x="426" y="60">your address —</text>
      <text class="kd" x="426" y="78">so friends can reach you</text>
      <!-- TURN -->
      <rect x="720" y="0" width="336" height="92" rx="12" fill="oklch(0.21 0.028 285)" stroke="oklch(0.245 0.03 285)"/>
      <circle cx="754" cy="46" r="20" fill="oklch(0.135 0.022 285)" stroke="oklch(0.62 0.2 292)" stroke-width="1.5"/>
      <use href="#i-relay" width="24" height="24" x="742" y="34" color="oklch(0.62 0.2 292)"/>
      <text class="kname vi" x="786" y="40">TURN</text>
      <text class="kd" x="786" y="60">a runner relays you —</text>
      <text class="kd" x="786" y="78">when the direct door's blocked</text>
    </g>

    <!-- ===== YOUR BOOTH (your mesh) ===== -->
    <g transform="translate(24,232)">
      <rect x="0" y="0" width="456" height="388" rx="18" fill="oklch(0.64 0.255 350 / 0.07)" stroke="oklch(0.64 0.255 350 / 0.55)" stroke-dasharray="3 5"/>
      <!-- booth sign -->
      <rect x="22" y="-14" width="166" height="30" rx="8" fill="oklch(0.21 0.028 285)" stroke="oklch(0.64 0.255 350 / 0.6)"/>
      <text class="bname ac" x="38" y="6">YOUR MESH</text>
      <text class="bsub" x="24" y="44">your spot — your devices find you here, and friends meet you here</text>

      <!-- you + your fleet -->
      <g stroke="oklch(0.64 0.255 350 / 0.5)" stroke-width="1.6" fill="none">
        <path d="M228 214 L150 150"/><path d="M228 214 L320 150"/><path d="M228 214 L168 286"/><path d="M228 214 L300 286"/>
      </g>
      <!-- you -->
      <circle cx="228" cy="214" r="27" fill="oklch(0.21 0.028 285)" stroke="oklch(0.64 0.255 350)" stroke-width="2"/>
      <use href="#i-person" width="30" height="30" x="213" y="199" color="oklch(0.93 0.012 285)"/>
      <text class="who ac" x="228" y="256" text-anchor="middle">you</text>
      <!-- devices -->
      <g><circle cx="150" cy="150" r="21" fill="oklch(0.21 0.028 285)" stroke="oklch(0.31 0.035 285)"/><use href="#i-laptop" width="24" height="24" x="138" y="138" color="oklch(0.93 0.012 285)"/></g>
      <g><circle cx="320" cy="150" r="21" fill="oklch(0.21 0.028 285)" stroke="oklch(0.31 0.035 285)"/><use href="#i-monitor" width="24" height="24" x="308" y="138" color="oklch(0.93 0.012 285)"/></g>
      <g><circle cx="168" cy="286" r="21" fill="oklch(0.21 0.028 285)" stroke="oklch(0.31 0.035 285)"/><use href="#i-tv" width="24" height="24" x="156" y="274" color="oklch(0.93 0.012 285)"/></g>
      <g><circle cx="300" cy="286" r="21" fill="oklch(0.21 0.028 285)" stroke="oklch(0.31 0.035 285)"/><use href="#i-phone" width="24" height="24" x="288" y="274" color="oklch(0.93 0.012 285)"/></g>
      <text class="flbl ac" x="228" y="352" text-anchor="middle">YOUR FLEET · your devices</text>
    </g>

    <!-- ===== ALEX'S BOOTH (their mesh) ===== -->
    <g transform="translate(600,232)">
      <rect x="0" y="0" width="456" height="388" rx="18" fill="oklch(0.62 0.2 292 / 0.08)" stroke="oklch(0.62 0.2 292 / 0.55)" stroke-dasharray="3 5"/>
      <rect x="268" y="-14" width="166" height="30" rx="8" fill="oklch(0.21 0.028 285)" stroke="oklch(0.62 0.2 292 / 0.6)"/>
      <text class="bname vi" x="284" y="6">ALEX'S MESH</text>
      <text class="bsub" x="432" y="44" text-anchor="end">Alex's spot — their own devices, their own booth</text>

      <g stroke="oklch(0.62 0.2 292 / 0.5)" stroke-width="1.6" fill="none">
        <path d="M228 214 L150 150"/><path d="M228 214 L320 150"/><path d="M228 214 L240 290"/>
      </g>
      <circle cx="228" cy="214" r="27" fill="oklch(0.21 0.028 285)" stroke="oklch(0.62 0.2 292)" stroke-width="2"/>
      <use href="#i-person" width="30" height="30" x="213" y="199" color="oklch(0.93 0.012 285)"/>
      <text class="who vi" x="228" y="256" text-anchor="middle">Alex</text>
      <g><circle cx="150" cy="150" r="21" fill="oklch(0.21 0.028 285)" stroke="oklch(0.31 0.035 285)"/><use href="#i-laptop" width="24" height="24" x="138" y="138" color="oklch(0.93 0.012 285)"/></g>
      <g><circle cx="320" cy="150" r="21" fill="oklch(0.21 0.028 285)" stroke="oklch(0.31 0.035 285)"/><use href="#i-phone" width="24" height="24" x="308" y="138" color="oklch(0.93 0.012 285)"/></g>
      <g><circle cx="240" cy="290" r="21" fill="oklch(0.21 0.028 285)" stroke="oklch(0.31 0.035 285)"/><use href="#i-tv" width="24" height="24" x="228" y="278" color="oklch(0.93 0.012 285)"/></g>
      <text class="flbl vi" x="228" y="352" text-anchor="middle">ALEX'S FLEET · their devices</text>
    </g>

    <!-- ===== SHARING (between booths) ===== -->
    <g transform="translate(0,232)">
      <text class="share" x="540" y="40" text-anchor="middle">SHARING</text>
      <!-- the hand-off: a grant crosses from your booth to Alex's -->
      <path d="M486 214 H530 M550 214 H594" stroke="oklch(0.64 0.255 350)" stroke-width="2.5" fill="none" class="flow"/>
      <path d="M594 214 l-9 -6 M594 214 l-9 6" stroke="oklch(0.64 0.255 350)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- grant token -->
      <rect x="478" y="170" width="124" height="60" rx="12" fill="oklch(0.21 0.028 285)" stroke="oklch(0.64 0.255 350)" filter="url(#sh)"/>
      <use href="#i-monitor" width="20" height="20" x="492" y="182" color="oklch(0.64 0.255 350)"/>
      <text class="tok" x="518" y="197">Screen</text>
      <use href="#i-check" width="15" height="15" x="492" y="206" color="oklch(0.8 0.17 150)"/>
      <text class="tok" x="512" y="218" style="font-size:12px">just for Alex</text>
      <text class="tiny" x="540" y="262" text-anchor="middle">you hand a friend</text>
      <text class="tiny" x="540" y="280" text-anchor="middle">one thing you choose</text>
      <text class="tiny" x="540" y="298" text-anchor="middle">— a friend, or a group</text>
    </g>
  </g>

  <!-- ============ THE JOURNEY (one line) ============ -->
  <text class="journey" x="600" y="868" text-anchor="middle"><tspan class="am">find the venue</tspan>  →  <tspan class="ac">claim your booth (mesh)</tspan>  →  <tspan class="ac">your devices gather (fleet)</tspan>  →  <tspan class="ok">share what you choose</tspan></text>
</svg>
