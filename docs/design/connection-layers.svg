<svg xmlns="http://www.w3.org/2000/svg" id="cl-poster" viewBox="0 0 1320 640" width="1320" height="640" role="img" aria-labelledby="t d">
  <title id="t">How AllMyStuff connects — in four steps</title>
  <desc id="d">A four-step journey. 1: your mesh is a name you call out (a beacon). 2: a venue is where you call it — a signal layer (Signal, STUN, TURN); you meet whoever calls the same name at a venue you share. 3: your fleet is every device you own, riding under your name. 4: sharing hands an owner one service from one device, and any of their devices can use it.</desc>

  <defs>
    <style>
      #cl-poster text{font-family:'Saira',system-ui,sans-serif}
      #cl-poster .eyebrow{font:600 14px 'IBM Plex Mono',ui-monospace,monospace;letter-spacing:.22em;fill:oklch(0.64 0.255 350)}
      #cl-poster .h1{font:700 42px 'Saira Condensed','Arial Narrow',system-ui,sans-serif;fill:oklch(0.93 0.012 285);letter-spacing:.004em}
      #cl-poster .sub{font:400 17px 'Saira',system-ui,sans-serif;fill:oklch(0.75 0.02 285)}
      #cl-poster .num{font:700 18px 'IBM Plex Mono',ui-monospace,monospace;fill:oklch(0.135 0.022 285)}
      #cl-poster .stept{font:700 17px 'Saira Condensed','Arial Narrow',system-ui,sans-serif;letter-spacing:.14em;fill:oklch(0.93 0.012 285)}
      #cl-poster .cap{font:400 13px 'Saira',system-ui,sans-serif;fill:oklch(0.66 0.025 285)}
      #cl-poster .chip{font:700 14px 'IBM Plex Mono',ui-monospace,monospace;letter-spacing:.04em}
      #cl-poster .mini{font:600 10.5px 'IBM Plex Mono',ui-monospace,monospace;letter-spacing:.1em}
      #cl-poster .ac{fill:oklch(0.64 0.255 350)} #cl-poster .vi{fill:oklch(0.62 0.2 292)} #cl-poster .ok{fill:oklch(0.8 0.17 150)} #cl-poster .am{fill:oklch(0.82 0.15 90)}
      #cl-poster .route{stroke-dasharray:1 10;animation:cl-flow 1.4s linear infinite}
      #cl-poster .wave{animation:cl-wave 2.2s ease-in-out infinite}
      @keyframes cl-flow{to{stroke-dashoffset:-22}}
      @keyframes cl-wave{0%,100%{opacity:.35}50%{opacity:1}}
      @media (prefers-reduced-motion:reduce){#cl-poster .route{animation:none}#cl-poster .wave{animation:none}}
    </style>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.4" fill="oklch(0.62 0.2 292)" opacity="0.1"/></pattern>
    <radialGradient id="gm" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="oklch(0.64 0.255 350)" stop-opacity="0.34"/><stop offset="100%" stop-color="oklch(0.64 0.255 350)" stop-opacity="0"/></radialGradient>
    <radialGradient id="gv" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="oklch(0.62 0.2 292)" stop-opacity="0.4"/><stop offset="100%" stop-color="oklch(0.62 0.2 292)" stop-opacity="0"/></radialGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.4"/></filter>
    <g id="i-laptop" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><rect x="4.5" y="5" width="15" height="10" rx="1.4"/><path d="M2.5 18.5 L21.5 18.5 L19.5 15 L4.5 15 Z"/></g>
    <g id="i-tv" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><rect x="3.5" y="6.5" width="17" height="11.5" rx="1.4"/><path d="M8.5 3 L12 6.3 L15.5 3"/></g>
    <g id="i-phone" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><rect x="7" y="2.8" width="10" height="18.4" rx="2.2"/><path d="M11 18.6 h2"/></g>
    <g id="i-monitor" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><rect x="3.5" y="4.5" width="17" height="11.5" rx="1.4"/><path d="M9 20 H15 M12 16 V20"/></g>
    <g id="i-person" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M5 20 a7 7 0 0 1 14 0"/></g>
    <g id="i-check" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5 l4.5 4.5 L19 7"/></g>
  </defs>

  <rect width="1320" height="640" fill="oklch(0.135 0.022 285)"/>
  <rect width="1320" height="640" fill="url(#dots)"/>
  <ellipse cx="220" cy="60" rx="520" ry="240" fill="url(#gm)"/>
  <ellipse cx="1080" cy="600" rx="560" ry="240" fill="url(#gv)"/>

  <!-- TITLE -->
  <path d="M80 64 h26" stroke="oklch(0.64 0.255 350)" stroke-opacity="0.5" stroke-width="1.5"/>
  <text class="eyebrow" x="116" y="69">HOW ALLMYSTUFF CONNECTS</text>
  <g transform="translate(1170,32) scale(0.38)" fill="oklch(0.64 0.255 350)"><g stroke="oklch(0.64 0.255 350)" stroke-width="13" fill="none" stroke-linecap="round"><path d="M128 74 L77 165 M128 74 L181 160 M77 165 L181 160"/></g><circle cx="128" cy="72" r="27"/><circle cx="76" cy="166" r="22"/><circle cx="182" cy="160" r="22"/></g>
  <text class="h1" x="78" y="112">Connecting, in four steps.</text>
  <text class="sub" x="80" y="142">Name a mesh, call it at a venue, and meet whoever's calling the same name — then bring your fleet, and share.</text>

  <!-- ROUTE -->
  <line x1="190" y1="232" x2="1130" y2="232" stroke="oklch(0.31 0.035 285)" stroke-width="2"/>
  <line x1="190" y1="232" x2="1130" y2="232" stroke="oklch(0.64 0.255 350)" stroke-width="2" class="route"/>

  <!-- ============ STEP 1 · MESH = a name ============ (cx 270) -->
  <g class="wave" stroke="oklch(0.64 0.255 350)" stroke-width="2" fill="none" stroke-linecap="round"><path d="M250 300 a8 8 0 0 1 40 0"/><path d="M242 290 a16 16 0 0 1 56 0"/></g>
  <rect x="222" y="306" width="96" height="34" rx="17" fill="oklch(0.21 0.028 285)" stroke="oklch(0.64 0.255 350)"/>
  <text class="chip ac" x="270" y="328" text-anchor="middle">“home”</text>
  <g><circle cx="270" cy="392" r="22" fill="oklch(0.21 0.028 285)" stroke="oklch(0.64 0.255 350)" stroke-width="1.8"/><use href="#i-person" width="26" height="26" x="257" y="379" color="oklch(0.93 0.012 285)"/></g>
  <line x1="270" y1="340" x2="270" y2="370" stroke="oklch(0.64 0.255 350 / 0.5)" stroke-width="1.5" stroke-dasharray="2 3"/>
  <circle cx="270" cy="232" r="21" fill="oklch(0.64 0.255 350)"/><text class="num" x="270" y="239" text-anchor="middle">1</text>
  <text class="stept" x="270" y="470" text-anchor="middle">YOUR MESH</text>
  <text class="cap" x="270" y="494" text-anchor="middle">a name you call out —</text>
  <text class="cap" x="270" y="512" text-anchor="middle">that name is the whole mesh</text>

  <!-- ============ STEP 2 · VENUE + connect ============ (cx 555) -->
  <rect x="448" y="286" width="214" height="118" rx="14" fill="oklch(0.165 0.024 285)" stroke="oklch(0.82 0.15 90 / 0.45)" filter="url(#sh)"/>
  <text class="mini am" x="466" y="312">A VENUE</text>
  <text class="cap" x="466" y="328" style="font-size:10.5px;fill:oklch(0.6 0.04 285)">SIGNAL · STUN · TURN</text>
  <g><circle cx="498" cy="368" r="17" fill="oklch(0.21 0.028 285)" stroke="oklch(0.64 0.255 350)" stroke-width="1.8"/><use href="#i-person" width="20" height="20" x="488" y="358" color="oklch(0.93 0.012 285)"/></g>
  <g><circle cx="612" cy="368" r="17" fill="oklch(0.21 0.028 285)" stroke="oklch(0.62 0.2 292)" stroke-width="1.8"/><use href="#i-person" width="20" height="20" x="602" y="358" color="oklch(0.93 0.012 285)"/></g>
  <line x1="517" y1="368" x2="593" y2="368" stroke="oklch(0.8 0.17 150)" stroke-width="6" stroke-opacity="0.18" stroke-linecap="round"/>
  <line x1="517" y1="368" x2="593" y2="368" stroke="oklch(0.8 0.17 150)" stroke-width="2" class="route"/>
  <text class="mini ok" x="555" y="356" text-anchor="middle" style="font-size:9px">SAME NAME HERE</text>
  <circle cx="555" cy="232" r="21" fill="oklch(0.64 0.255 350)"/><text class="num" x="555" y="239" text-anchor="middle">2</text>
  <line x1="555" y1="253" x2="555" y2="286" stroke="oklch(0.31 0.035 285)" stroke-width="1.5"/>
  <text class="stept" x="555" y="470" text-anchor="middle">A VENUE</text>
  <text class="cap" x="555" y="494" text-anchor="middle">the place you call it. You meet</text>
  <text class="cap" x="555" y="512" text-anchor="middle">whoever calls the same name there.</text>

  <!-- ============ STEP 3 · FLEET ============ (cx 815) -->
  <circle cx="815" cy="362" r="58" fill="none" stroke="oklch(0.64 0.255 350 / 0.4)" stroke-width="1.6" stroke-dasharray="4 5"/>
  <g><circle cx="815" cy="330" r="19" fill="oklch(0.21 0.028 285)" stroke="oklch(0.64 0.255 350)" stroke-width="1.7"/><use href="#i-laptop" width="22" height="22" x="804" y="319" color="oklch(0.93 0.012 285)"/></g>
  <g><circle cx="778" cy="388" r="19" fill="oklch(0.21 0.028 285)" stroke="oklch(0.64 0.255 350)" stroke-width="1.7"/><use href="#i-phone" width="22" height="22" x="767" y="377" color="oklch(0.93 0.012 285)"/></g>
  <g><circle cx="852" cy="388" r="19" fill="oklch(0.21 0.028 285)" stroke="oklch(0.64 0.255 350)" stroke-width="1.7"/><use href="#i-tv" width="22" height="22" x="841" y="377" color="oklch(0.93 0.012 285)"/></g>
  <text class="mini ac" x="815" y="436" text-anchor="middle" style="font-size:9px">ALL YOURS</text>
  <circle cx="815" cy="232" r="21" fill="oklch(0.64 0.255 350)"/><text class="num" x="815" y="239" text-anchor="middle">3</text>
  <line x1="815" y1="253" x2="815" y2="300" stroke="oklch(0.31 0.035 285)" stroke-width="1.5"/>
  <text class="stept" x="815" y="470" text-anchor="middle">YOUR FLEET</text>
  <text class="cap" x="815" y="494" text-anchor="middle">every device you own, riding</text>
  <text class="cap" x="815" y="512" text-anchor="middle">under your name — not the mesh, yours</text>

  <!-- ============ STEP 4 · SHARING ============ (cx 1050) -->
  <rect x="978" y="300" width="120" height="40" rx="10" fill="oklch(0.21 0.028 285)" stroke="oklch(0.64 0.255 350)"/>
  <use href="#i-monitor" width="18" height="18" x="992" y="311" color="oklch(0.64 0.255 350)"/>
  <text class="chip" x="1016" y="325" style="font-size:12px;fill:oklch(0.93 0.012 285)">a thing</text>
  <path d="M1038 340 V360" stroke="oklch(0.64 0.255 350)" stroke-width="2" class="route"/><path d="M1038 360 l-5 -7 M1038 360 l5 -7" stroke="oklch(0.64 0.255 350)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <g><circle cx="1038" cy="384" r="19" fill="oklch(0.21 0.028 285)" stroke="oklch(0.62 0.2 292)" stroke-width="1.9"/><use href="#i-person" width="22" height="22" x="1027" y="373" color="oklch(0.93 0.012 285)"/></g>
  <use href="#i-check" width="14" height="14" x="1064" y="377" color="oklch(0.8 0.17 150)"/>
  <text class="mini vi" x="1038" y="424" text-anchor="middle" style="font-size:9px">THE OWNER</text>
  <circle cx="1050" cy="232" r="21" fill="oklch(0.64 0.255 350)"/><text class="num" x="1050" y="239" text-anchor="middle">4</text>
  <line x1="1050" y1="253" x2="1050" y2="296" stroke="oklch(0.31 0.035 285)" stroke-width="1.5"/>
  <text class="stept" x="1050" y="470" text-anchor="middle">SHARING</text>
  <text class="cap" x="1050" y="494" text-anchor="middle">give an owner one thing —</text>
  <text class="cap" x="1050" y="512" text-anchor="middle">any of their devices can use it</text>

  <!-- FOOT -->
  <text class="cap" x="660" y="582" text-anchor="middle" style="font-size:13px;fill:oklch(0.6 0.025 285)">the rule beneath it all: <tspan style="fill:oklch(0.93 0.012 285);font-weight:600">same name + shared venue = you can see each other</tspan>  ·  soon: one mesh bridged across several venues</text>
</svg>
