<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16181f"/>
      <stop offset="1" stop-color="#0f1014"/>
    </linearGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#7c5cff" fill-opacity="0.13"/>
    </pattern>
    <clipPath id="round"><rect x="0" y="0" width="600" height="600" rx="11"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- panel -->
    <rect x="0" y="0" width="600" height="600" fill="url(#panel)"/>

    <!-- window chrome -->
    <rect x="0" y="0" width="600" height="44" fill="#13151b"/>
    <line x1="0" y1="44" x2="600" y2="44" stroke="#2a2d39"/>
    <text x="18" y="27" fill="#6c7280" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="1.5">ALLMYSTUFF — YOUR STUFF, AS A GRAPH</text>
    <rect x="462" y="11" width="120" height="22" rx="11" fill="#15171e" stroke="#2a2d39"/>
    <circle cx="476" cy="22" r="3" fill="#34d399"/>
    <text x="486" y="26" fill="#9aa1af" font-size="9.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="1">MESH · ONLINE</text>

    <!-- canvas dot grid -->
    <rect x="0" y="45" width="600" height="520" fill="url(#dots)"/>

    <!-- ROUTE WIRES (base + dashed flow) -->
    <!-- display: den-tower -> kestrel -->
    <path d="M300 153 Q334 208 300 263" fill="none" stroke="#f11ea1" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <path d="M300 153 Q334 208 300 263" fill="none" stroke="#f11ea1" stroke-width="3" stroke-linecap="round" stroke-dasharray="1 13" opacity="0.95"/>
    <!-- files: nas-01 -> kestrel -->
    <path d="M300 437 Q266 381 300 325" fill="none" stroke="#2dd4bf" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <path d="M300 437 Q266 381 300 325" fill="none" stroke="#2dd4bf" stroke-width="3" stroke-linecap="round" stroke-dasharray="1 13" opacity="0.95"/>

    <!-- route labels -->
    <rect x="322" y="194" width="132" height="18" rx="2" fill="#0e0f14" stroke="#f11ea1" stroke-opacity="0.55"/>
    <text x="330" y="206" fill="#f11ea1" font-size="8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0.6">DISPLAY · H.264 · 23 MS</text>
    <rect x="150" y="372" width="98" height="18" rx="2" fill="#0e0f14" stroke="#2dd4bf" stroke-opacity="0.55"/>
    <text x="158" y="384" fill="#2dd4bf" font-size="8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0.6">FILES · 41 MB/S</text>

    <!-- NODE: den-tower (yours) -->
    <g>
      <rect x="212" y="91" width="176" height="62" rx="7" fill="#1b1e28" stroke="#3a3f4f"/>
      <text x="226" y="113" fill="#e7e9ef" font-size="13" font-weight="600">den-tower</text>
      <text x="226" y="128" fill="#6c7280" font-size="9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">Ryzen 9 7950X · 64 GB</text>
      <circle cx="372" cy="109" r="7" fill="#34d399" fill-opacity="0.16"/>
      <circle cx="372" cy="109" r="4" fill="#34d399"/>
      <rect x="226" y="135" width="42" height="13" rx="2" fill="#34d399" fill-opacity="0.16"/>
      <text x="232" y="144" fill="#34d399" font-size="7.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0.5">YOURS</text>
    </g>

    <!-- NODE: kestrel (this device, center) -->
    <g>
      <rect x="209" y="260" width="182" height="68" rx="8" fill="none" stroke="#f11ea1" stroke-opacity="0.28" stroke-width="3"/>
      <rect x="212" y="263" width="176" height="62" rx="7" fill="#1b1e28" stroke="#f11ea1" stroke-width="1.5"/>
      <text x="226" y="285" fill="#e7e9ef" font-size="13" font-weight="600">kestrel</text>
      <text x="226" y="300" fill="#6c7280" font-size="9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">Apple M2 Pro · MacBook</text>
      <circle cx="372" cy="281" r="7" fill="#34d399" fill-opacity="0.16"/>
      <circle cx="372" cy="281" r="4" fill="#34d399"/>
      <rect x="226" y="307" width="72" height="13" rx="2" fill="#f11ea1" fill-opacity="0.16"/>
      <text x="232" y="316" fill="#f11ea1" font-size="7.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0.5">THIS DEVICE</text>
    </g>

    <!-- NODE: nas-01 (yours) -->
    <g>
      <rect x="212" y="437" width="176" height="62" rx="7" fill="#1b1e28" stroke="#3a3f4f"/>
      <text x="226" y="459" fill="#e7e9ef" font-size="13" font-weight="600">nas-01</text>
      <text x="226" y="474" fill="#6c7280" font-size="9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">Intel N5105 · 12 TB</text>
      <circle cx="372" cy="455" r="7" fill="#34d399" fill-opacity="0.16"/>
      <circle cx="372" cy="455" r="4" fill="#34d399"/>
      <rect x="226" y="481" width="42" height="13" rx="2" fill="#34d399" fill-opacity="0.16"/>
      <text x="232" y="490" fill="#34d399" font-size="7.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0.5">YOURS</text>
    </g>

    <!-- NODE: office-pc (yours) -->
    <g>
      <rect x="22" y="263" width="176" height="62" rx="7" fill="#1b1e28" stroke="#3a3f4f"/>
      <text x="36" y="285" fill="#e7e9ef" font-size="13" font-weight="600">office-pc</text>
      <text x="36" y="300" fill="#6c7280" font-size="9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">Core i5 · 32 GB</text>
      <circle cx="182" cy="281" r="7" fill="#34d399" fill-opacity="0.16"/>
      <circle cx="182" cy="281" r="4" fill="#34d399"/>
      <rect x="36" y="307" width="42" height="13" rx="2" fill="#34d399" fill-opacity="0.16"/>
      <text x="42" y="316" fill="#34d399" font-size="7.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0.5">YOURS</text>
    </g>

    <!-- NODE: hp-laserjet (on the mesh, not running the app) -->
    <g opacity="0.6">
      <rect x="404" y="263" width="176" height="62" rx="7" fill="#15171e" stroke="#3a3f4f" stroke-dasharray="3 3"/>
      <text x="418" y="285" fill="#9aa1af" font-size="13" font-weight="600">hp-laserjet</text>
      <text x="418" y="300" fill="#6c7280" font-size="9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">on the mesh</text>
      <circle cx="564" cy="281" r="4" fill="#3a3f4f"/>
      <rect x="418" y="307" width="108" height="13" rx="2" fill="none" stroke="#3a3f4f" stroke-dasharray="2 2"/>
      <text x="424" y="316" fill="#6c7280" font-size="7.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="0.5">NOT ON ALLMYSTUFF</text>
    </g>

    <!-- zoom bar -->
    <rect x="510" y="528" width="74" height="24" rx="4" fill="#15171e" stroke="#2a2d39"/>
    <text x="524" y="544" fill="#9aa1af" font-size="14" text-anchor="middle">−</text>
    <text x="547" y="543" fill="#6c7280" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" text-anchor="middle">100%</text>
    <text x="572" y="544" fill="#9aa1af" font-size="14" text-anchor="middle">+</text>

    <!-- footer status bar -->
    <rect x="0" y="566" width="600" height="34" fill="#12141a"/>
    <line x1="0" y1="566" x2="600" y2="566" stroke="#2a2d39"/>
    <text x="18" y="587" fill="#6c7280" font-size="9.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="1">2 ROUTES ACTIVE</text>
    <text x="582" y="587" fill="#6c7280" font-size="9.5" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" letter-spacing="1" text-anchor="end">4 DEVICES · 1 ON THE MESH</text>
  </g>

  <!-- panel border on top -->
  <rect x="0.5" y="0.5" width="599" height="599" rx="11" fill="none" stroke="#2a2d39"/>
</svg>
