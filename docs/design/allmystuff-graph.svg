<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760" font-family="Inter, -apple-system, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <radialGradient id="bg" cx="12%" cy="-10%" r="90%">
      <stop offset="0%" stop-color="#eef0fb"/>
      <stop offset="100%" stop-color="#f6f7fb"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1c1d2b" flood-opacity="0.10"/>
    </filter>
    <filter id="shadowSoft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1c1d2b" flood-opacity="0.08"/>
    </filter>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#6c5ce7" opacity="0.10"/>
    </pattern>
  </defs>

  <!-- backdrop -->
  <rect width="1180" height="760" fill="url(#bg)"/>
  <rect x="0" y="56" width="800" height="704" fill="url(#dots)"/>

  <!-- ============ top bar ============ -->
  <rect x="0" y="0" width="1180" height="56" fill="#ffffff" opacity="0.82"/>
  <line x1="0" y1="56" x2="1180" y2="56" stroke="#e7e8f0"/>
  <text x="24" y="30" font-size="22">🧦</text>
  <text x="52" y="27" font-size="17" font-weight="800" fill="#1c1d2b">AllMyStuff</text>
  <text x="52" y="42" font-size="11" fill="#9598ad">everything you own, wired together</text>

  <!-- summary chips -->
  <g transform="translate(720,18)">
    <rect width="76" height="24" rx="12" fill="#f3f4f9" stroke="#e7e8f0"/>
    <text x="38" y="16" font-size="12" text-anchor="middle" fill="#5b5e74"><tspan font-weight="700" fill="#1c1d2b">4</tspan> yours</text>
    <rect x="84" width="86" height="24" rx="12" fill="#f3f4f9" stroke="#e7e8f0"/>
    <text x="127" y="16" font-size="12" text-anchor="middle" fill="#5b5e74"><tspan font-weight="700" fill="#1c1d2b">1</tspan> shared</text>
    <rect x="178" width="138" height="24" rx="12" fill="#e7f6ef" stroke="#c9ebda"/>
    <circle cx="192" cy="12" r="3.5" fill="#137a52"/>
    <text x="204" y="16" font-size="12" fill="#137a52">mesh connected</text>
  </g>
  <!-- actions -->
  <g transform="translate(1052,16)">
    <rect width="58" height="26" rx="13" fill="#ffffff" stroke="#d7d9e6" filter="url(#shadowSoft)"/>
    <text x="29" y="17" font-size="12" text-anchor="middle" fill="#1c1d2b">↻ Scan</text>
    <rect x="66" width="58" height="26" rx="13" fill="#6c5ce7"/>
    <text x="95" y="17" font-size="12" text-anchor="middle" fill="#ffffff" font-weight="600">＋ Add</text>
  </g>

  <!-- ============ edges (drawn under nodes) ============ -->
  <!-- this:system → desk speakers (audio) -->
  <path d="M 400 410 Q 360 300 400 232" stroke="#f0a500" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M 400 410 Q 360 300 400 232" stroke="#f0a500" stroke-width="3" fill="none" stroke-dasharray="1 14" stroke-linecap="round"/>
  <!-- desk:screen → tv (display) -->
  <path d="M 400 200 Q 560 230 612 332" stroke="#3b82f6" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M 400 200 Q 560 230 612 332" stroke="#3b82f6" stroke-width="3" fill="none" stroke-dasharray="1 14" stroke-linecap="round"/>
  <!-- studio array → this (audio) -->
  <path d="M 556 560 Q 470 500 400 444" stroke="#f0a500" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M 556 560 Q 470 500 400 444" stroke="#f0a500" stroke-width="3" fill="none" stroke-dasharray="1 14" stroke-linecap="round"/>
  <!-- this → alex (display, pending/faint) -->
  <path d="M 360 438 Q 280 500 232 528" stroke="#3b82f6" stroke-width="2.5" fill="none" opacity="0.25" stroke-dasharray="5 6" stroke-linecap="round"/>

  <!-- ============ nodes ============ -->
  <!-- THIS: My MacBook (center, selected) -->
  <g filter="url(#shadow)">
    <rect x="322" y="374" width="156" height="74" rx="14" fill="#ffffff" stroke="#6c5ce7" stroke-width="2"/>
    <rect x="320" y="372" width="160" height="78" rx="16" fill="none" stroke="#efeafe" stroke-width="4"/>
  </g>
  <text x="338" y="404" font-size="20">💻</text>
  <text x="366" y="398" font-size="13" font-weight="650" fill="#1c1d2b">My MacBook</text>
  <text x="366" y="412" font-size="10.5" fill="#9598ad">Apple M2</text>
  <circle cx="464" cy="392" r="4.5" fill="#1aa06d"/>
  <g transform="translate(338,422)">
    <rect width="58" height="15" rx="7.5" fill="#efeafe"/><text x="29" y="11" font-size="9" text-anchor="middle" fill="#4a3bc0" font-weight="650">this device</text>
    <rect x="62" width="38" height="15" rx="7.5" fill="#f3f4f9"/><text x="81" y="11" font-size="9" text-anchor="middle" fill="#5b5e74">13 things</text>
  </g>

  <!-- Desk PC (top) -->
  <g filter="url(#shadowSoft)">
    <rect x="322" y="164" width="156" height="74" rx="14" fill="#ffffff" stroke="#d7d9e6"/>
  </g>
  <text x="338" y="194" font-size="20">🪟</text>
  <text x="366" y="188" font-size="13" font-weight="650" fill="#1c1d2b">Desk PC</text>
  <text x="366" y="202" font-size="10.5" fill="#9598ad">Ryzen 7 7700</text>
  <circle cx="464" cy="182" r="4.5" fill="#1aa06d"/>
  <g transform="translate(338,212)">
    <rect width="40" height="15" rx="7.5" fill="#e7f6ef"/><text x="20" y="11" font-size="9" text-anchor="middle" fill="#137a52" font-weight="650">yours</text>
    <rect x="44" width="38" height="15" rx="7.5" fill="#f3f4f9"/><text x="63" y="11" font-size="9" text-anchor="middle" fill="#5b5e74">11 things</text>
  </g>

  <!-- Living-room TV (right) -->
  <g filter="url(#shadowSoft)">
    <rect x="556" y="332" width="150" height="70" rx="14" fill="#ffffff" stroke="#d7d9e6"/>
  </g>
  <text x="570" y="362" font-size="19">📺</text>
  <text x="596" y="356" font-size="12.5" font-weight="650" fill="#1c1d2b">Living-room TV</text>
  <text x="596" y="370" font-size="10" fill="#9598ad">Amlogic S905</text>
  <circle cx="692" cy="349" r="4.5" fill="#1aa06d"/>
  <g transform="translate(570,380)">
    <rect width="40" height="14" rx="7" fill="#e7f6ef"/><text x="20" y="10.5" font-size="8.5" text-anchor="middle" fill="#137a52" font-weight="650">yours</text>
  </g>

  <!-- Conference puck (bottom) -->
  <g filter="url(#shadowSoft)">
    <rect x="482" y="546" width="150" height="70" rx="14" fill="#ffffff" stroke="#d7d9e6"/>
  </g>
  <text x="496" y="576" font-size="19">🖥</text>
  <text x="522" y="570" font-size="12.5" font-weight="650" fill="#1c1d2b">Conference puck</text>
  <text x="522" y="584" font-size="10" fill="#9598ad">ReSpeaker · 6-mic array</text>
  <circle cx="618" cy="563" r="4.5" fill="#1aa06d"/>
  <g transform="translate(496,594)">
    <rect width="40" height="14" rx="7" fill="#e7f6ef"/><text x="20" y="10.5" font-size="8.5" text-anchor="middle" fill="#137a52" font-weight="650">yours</text>
  </g>

  <!-- Alex's laptop (shared) -->
  <g filter="url(#shadowSoft)">
    <rect x="156" y="500" width="152" height="70" rx="14" fill="#fffaf0" stroke="#f0c27a" stroke-width="1.5"/>
  </g>
  <text x="170" y="530" font-size="19">🧑</text>
  <text x="196" y="524" font-size="12.5" font-weight="650" fill="#1c1d2b">Alex's laptop</text>
  <text x="196" y="538" font-size="10" fill="#9598ad">shared with Alex</text>
  <circle cx="294" cy="517" r="4.5" fill="#d7d9e6"/>
  <g transform="translate(170,548)">
    <rect width="42" height="14" rx="7" fill="#fdedd2"/><text x="21" y="10.5" font-size="8.5" text-anchor="middle" fill="#97631a" font-weight="650">guest</text>
  </g>

  <!-- arm banner (connect mode hint) -->
  <g transform="translate(248,86)" filter="url(#shadow)">
    <rect width="304" height="34" rx="17" fill="#1c1d2b"/>
    <text x="20" y="22" font-size="12.5" fill="#ffffff">Connecting your mic — tap where it goes</text>
    <rect x="240" y="7" width="54" height="20" rx="10" fill="#ffffff" opacity="0.16"/>
    <text x="267" y="21" font-size="11" fill="#ffffff" text-anchor="middle">Cancel</text>
  </g>

  <!-- zoom bar -->
  <g transform="translate(700,694)" filter="url(#shadowSoft)">
    <rect width="92" height="30" rx="15" fill="#ffffff" stroke="#e7e8f0"/>
    <text x="20" y="20" font-size="15" text-anchor="middle" fill="#5b5e74">−</text>
    <text x="46" y="19" font-size="11" text-anchor="middle" fill="#5b5e74">100%</text>
    <text x="74" y="20" font-size="15" text-anchor="middle" fill="#5b5e74">+</text>
  </g>

  <!-- ============ groups bar (bottom-left) ============ -->
  <g transform="translate(16,612)" filter="url(#shadow)">
    <rect width="300" height="132" rx="12" fill="#ffffff" stroke="#e7e8f0"/>
    <text x="14" y="26" font-size="12.5" font-weight="650" fill="#5b5e74">Groups</text>
    <rect x="232" y="12" width="56" height="22" rx="11" fill="#ffffff" stroke="#d7d9e6"/>
    <text x="260" y="27" font-size="11" text-anchor="middle" fill="#1c1d2b">＋ New</text>

    <rect x="12" y="44" width="276" height="44" rx="9" fill="#f3f4f9"/>
    <text x="24" y="64" font-size="13" font-weight="600" fill="#1c1d2b">📦 My desk</text>
    <text x="24" y="79" font-size="10.5" fill="#9598ad">5 things · Built-in display, Magic Keyboard…</text>
    <rect x="214" y="54" width="62" height="24" rx="12" fill="#6c5ce7"/>
    <text x="245" y="70" font-size="11" text-anchor="middle" fill="#ffffff" font-weight="600">Send…</text>

    <rect x="12" y="96" width="276" height="26" rx="8" fill="#ffffff" stroke="#eef0f5"/>
    <text x="24" y="113" font-size="10.5" fill="#9598ad">Bundle a screen, keyboard &amp; audio into a “desk”…</text>
  </g>

  <!-- ============ node drawer (right) ============ -->
  <g filter="url(#shadow)">
    <rect x="800" y="56" width="380" height="704" fill="#ffffff"/>
    <line x1="800" y1="56" x2="800" y2="760" stroke="#e7e8f0"/>
  </g>
  <g transform="translate(820,78)">
    <text x="0" y="26" font-size="26">🪟</text>
    <text x="40" y="20" font-size="17" font-weight="700" fill="#1c1d2b">Desk PC</text>
    <rect x="40" y="28" width="44" height="16" rx="8" fill="#e7f6ef"/><text x="62" y="40" font-size="9.5" text-anchor="middle" fill="#137a52" font-weight="650">yours</text>
    <text x="92" y="40" font-size="10.5" fill="#1aa06d">online</text>
    <circle cx="332" cy="20" r="13" fill="#f3f4f9"/><text x="332" y="24" font-size="10" text-anchor="middle" fill="#5b5e74">✕</text>

    <!-- stats grid -->
    <g transform="translate(0,58)">
      <rect width="166" height="44" rx="8" fill="#f3f4f9"/>
      <text x="12" y="18" font-size="9" fill="#9598ad" letter-spacing="0.5">SYSTEM</text>
      <text x="12" y="34" font-size="13" font-weight="600" fill="#1c1d2b">Windows 11</text>
      <rect x="174" width="166" height="44" rx="8" fill="#f3f4f9"/>
      <text x="186" y="18" font-size="9" fill="#9598ad" letter-spacing="0.5">CHIP</text>
      <text x="186" y="34" font-size="13" font-weight="600" fill="#1c1d2b">Ryzen 7 7700</text>
      <rect y="52" width="166" height="44" rx="8" fill="#f3f4f9"/>
      <text x="12" y="70" font-size="9" fill="#9598ad" letter-spacing="0.5">MEMORY</text>
      <text x="12" y="86" font-size="13" font-weight="600" fill="#1c1d2b">32 GB</text>
      <rect x="174" y="52" width="166" height="44" rx="8" fill="#f3f4f9"/>
      <text x="186" y="70" font-size="9" fill="#9598ad" letter-spacing="0.5">THINGS</text>
      <text x="186" y="86" font-size="13" font-weight="600" fill="#1c1d2b">11</text>
    </g>

    <!-- connected now -->
    <line x1="0" y1="170" x2="340" y2="170" stroke="#e7e8f0"/>
    <text x="0" y="190" font-size="12.5" font-weight="650" fill="#5b5e74">Connected now</text>
    <g transform="translate(0,200)">
      <rect width="340" height="30" rx="8" fill="#f3f4f9"/>
      <circle cx="16" cy="15" r="4.5" fill="#3b82f6"/>
      <text x="30" y="19" font-size="11.5" fill="#1c1d2b">Screen → LG OLED</text>
      <text x="322" y="20" font-size="11" fill="#9598ad">✕</text>
    </g>

    <!-- its stuff -->
    <text x="0" y="262" font-size="12.5" font-weight="650" fill="#5b5e74">Its stuff</text>
    <text x="0" y="284" font-size="11" font-weight="700" fill="#3b82f6">🖥 Screen</text>
    <g transform="translate(0,292)">
      <text x="2" y="16" font-size="15">🪟</text>
      <text x="28" y="13" font-size="12.5" fill="#1c1d2b">Screen</text>
      <text x="28" y="26" font-size="10" fill="#9598ad">sends</text>
      <circle cx="324" cy="14" r="13" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="324" y="18" font-size="11" text-anchor="middle" fill="#3b82f6">⟶</text>
    </g>
    <g transform="translate(0,328)">
      <text x="2" y="16" font-size="15">🖥</text>
      <text x="28" y="13" font-size="12.5" fill="#1c1d2b">Dell U2720Q</text>
      <text x="28" y="26" font-size="10" fill="#9598ad">receives</text>
      <circle cx="324" cy="14" r="13" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="324" y="18" font-size="11" text-anchor="middle" fill="#3b82f6">⟶</text>
    </g>
    <text x="0" y="386" font-size="11" font-weight="700" fill="#f0a500">🎙 Audio</text>
    <g transform="translate(0,394)">
      <text x="2" y="16" font-size="15">🔊</text>
      <text x="28" y="13" font-size="12.5" fill="#1c1d2b">Desk speakers</text>
      <text x="28" y="26" font-size="10" fill="#9598ad">receives</text>
      <circle cx="324" cy="14" r="13" fill="#ffffff" stroke="#f0a500" stroke-width="1.5"/>
      <text x="324" y="18" font-size="11" text-anchor="middle" fill="#f0a500">⟶</text>
    </g>
    <g transform="translate(0,430)">
      <text x="2" y="16" font-size="15">🎙</text>
      <text x="28" y="13" font-size="12.5" fill="#1c1d2b">Blue Yeti</text>
      <text x="28" y="26" font-size="10" fill="#9598ad">sends</text>
      <circle cx="324" cy="14" r="13" fill="#ffffff" stroke="#f0a500" stroke-width="1.5"/>
      <text x="324" y="18" font-size="11" text-anchor="middle" fill="#f0a500">⟶</text>
    </g>
  </g>

  <!-- ============ media legend ============ -->
  <g transform="translate(16,70)">
    <rect width="232" height="30" rx="15" fill="#ffffff" stroke="#e7e8f0" filter="url(#shadowSoft)"/>
    <circle cx="18" cy="15" r="5" fill="#f0a500"/><text x="28" y="19" font-size="10.5" fill="#5b5e74">audio</text>
    <circle cx="70" cy="15" r="5" fill="#8b5cf6"/><text x="80" y="19" font-size="10.5" fill="#5b5e74">video</text>
    <circle cx="122" cy="15" r="5" fill="#3b82f6"/><text x="132" y="19" font-size="10.5" fill="#5b5e74">screen</text>
    <circle cx="180" cy="15" r="5" fill="#22a06b"/><text x="190" y="19" font-size="10.5" fill="#5b5e74">input</text>
  </g>
</svg>
